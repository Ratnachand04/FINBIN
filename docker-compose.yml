services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    container_name: binfin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binfin}
      POSTGRES_USER: ${POSTGRES_USER:-binfin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-binfin}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 4g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  redis:
    image: redis:7-alpine
    container_name: binfin-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    networks:
      - binfin_net

  ollama:
    image: ollama/ollama:latest
    container_name: binfin-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./models:/models
    command: ["ollama", "serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    mem_limit: 24g
    cpus: "6.0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - binfin_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: binfin-backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_URL: http://ollama:11434
      RAG_OLLAMA_URL: http://ollama:11434
      RAG_OLLAMA_MODEL: ${RAG_OLLAMA_MODEL:-binfin-custom}
      RAG_CONTEXT_DEVICE: ${RAG_CONTEXT_DEVICE:-cpu}
      RAG_CONTEXT_CPU_ONLY: ${RAG_CONTEXT_CPU_ONLY:-true}
      RAG_CONTEXT_TIMEOUT_SECONDS: ${RAG_CONTEXT_TIMEOUT_SECONDS:-5}
      RAG_GENERATION_TIMEOUT_SECONDS: ${RAG_GENERATION_TIMEOUT_SECONDS:-60}
      CUDA_VISIBLE_DEVICES: ""
    command:
      [
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend/public:/app/frontend/public:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: binfin-frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      WS_SIGNALS_URL: ws://backend:8000/api/v1/signals/ws/notifications
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8501/_stcore/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    mem_limit: 2g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  llm-trainer:
    profiles: ["llm-train"]
    build:
      context: ./llm_trainer
      dockerfile: Dockerfile
    container_name: binfin-llm-trainer
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./llm_trainer:/workspace
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - binfin_net

networks:
  binfin_net:
    name: binfin-net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_models:
