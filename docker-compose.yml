x-worker-common: &worker-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
  working_dir: /app/backend
  restart: unless-stopped
  networks:
    - binfin_net

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    container_name: binfin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binfin}
      POSTGRES_USER: ${POSTGRES_USER:-binfin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-binfin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 4g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  redis:
    image: redis:7-alpine
    container_name: binfin-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    networks:
      - binfin_net

  ollama:
    image: ollama/ollama:latest
    container_name: binfin-ollama
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      sh -c "ollama serve &
      sleep 5 &&
      ollama pull mistral:7b-instruct-q4_K_M &&
      wait"
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    mem_limit: 24g
    cpus: "6.0"
    restart: unless-stopped
    networks:
      - binfin_net

  data-ingestion-worker:
    <<: *worker-common
    container_name: binfin-data-ingestion-worker
    command: ["python", "-m", "workers.ingestion"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; socket.create_connection(('postgres',5432),2).close(); socket.create_connection(('redis',6379),2).close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: "1.5"

  ml-processing-worker:
    <<: *worker-common
    container_name: binfin-ml-processing-worker
    command: ["python", "-m", "workers.ml_processor"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ml_models:/app/models
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; socket.create_connection(('postgres',5432),2).close(); socket.create_connection(('redis',6379),2).close(); socket.create_connection(('ollama',11434),2).close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 16g
    cpus: "4.0"

  signal-generator-worker:
    <<: *worker-common
    container_name: binfin-signal-generator-worker
    command: ["python", "-m", "workers.signal_generator"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; socket.create_connection(('postgres',5432),2).close(); socket.create_connection(('redis',6379),2).close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: "1.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: binfin-backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command:
      [
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: binfin-frontend
    env_file:
      - .env
    command:
      [
        "streamlit",
        "run",
        "app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501', timeout=3).read()\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 25s
    mem_limit: 2g
    cpus: "2.0"
    restart: unless-stopped
    networks:
      - binfin_net

  prometheus:
    image: prom/prometheus:latest
    container_name: binfin-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    networks:
      - binfin_net

  grafana:
    image: grafana/grafana:latest
    container_name: binfin-grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 25s
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    networks:
      - binfin_net

networks:
  binfin_net:
    name: binfin-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
  ollama_models:
  ml_models:
  prometheus_data:
  grafana_data:
